[package]
name = "wasm-core"
version = "0.1.0"
edition = "2021"
description = "WASM core for LogScrub PII detection"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.10"
once_cell = "1.19"
flate2 = "1.0"
zip = { version = "0.6", default-features = false, features = ["deflate"] }
quick-xml = "0.31"
csv = "1.3"
serde_yaml = "0.9"
toml = "0.8"
pcap-file = "2.0"
etherparse = "0.15"
fit-rust = "0.1"
fake = { version = "2.9", features = ["derive"] }
rand = { version = "0.8", features = ["small_rng"] }
getrandom = { version = "0.2", features = ["js"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"
lto = true
